<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Invaders</title>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; overflow: hidden; }
        canvas { 
            border: 2px solid #00f2ff; 
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .ui { margin: 10px; font-size: 1.2rem; color: #00f2ff; }
        .back-btn { color: #64748b; text-decoration: none; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="ui">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <a href="../../index.html" class="back-btn">← Back to Hub</a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let score = 0;
        const player = { x: 285, y: 370, w: 30, h: 20, speed: 5 };
        const bullets = [];
        const enemies = [];
        const enemyRows = 3;
        const enemyCols = 8;
        let enemyDirection = 1;
        let enemyTimer = 0;

        // Initialize Enemies
        for(let r=0; r<enemyRows; r++) {
            for(let c=0; c<enemyCols; c++) {
                enemies.push({ x: c * 60 + 50, y: r * 40 + 50, w: 30, h: 20 });
            }
        }

        const keys = {};
        window.onkeydown = e => keys[e.key] = true;
        window.onkeyup = e => keys[e.key] = false;

        function update() {
            if(keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if(keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;
            if(keys[' ']) {
                if(bullets.length < 3) bullets.push({x: player.x + 13, y: player.y, w: 4, h: 10});
                keys[' '] = false; // Prevent rapid fire
            }

            bullets.forEach((b, i) => {
                b.y -= 7;
                if(b.y < 0) bullets.splice(i, 1);
            });

            let changeDir = false;
            enemies.forEach(en => {
                en.x += enemyDirection * 1;
                if(en.x > canvas.width - en.w || en.x < 0) changeDir = true;

                bullets.forEach((b, bi) => {
                    if(b.x < en.x + en.w && b.x + b.w > en.x && b.y < en.y + en.h && b.y + b.h > en.y) {
                        enemies.splice(enemies.indexOf(en), 1);
                        bullets.splice(bi, 1);
                        score += 100;
                        scoreEl.innerText = score;
                    }
                });
            });

            if(changeDir) {
                enemyDirection *= -1;
                enemies.forEach(en => en.y += 10);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Player
            ctx.fillStyle = '#00f2ff';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Bullets
            ctx.fillStyle = '#fff';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Enemies
            ctx.fillStyle = '#ff006e';
            enemies.forEach(en => ctx.fillRect(en.x, en.y, en.w, en.h));

            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
