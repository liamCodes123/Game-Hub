<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Fixed Pong</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        canvas { border: 4px solid #00f2ff; background: #000; }
        .controls { margin: 20px; }
    </style>
</head>
<body>
    <div id="status">Status: Initializing...</div>
    <div class="controls">
        <button onclick="createRoom()">Host Game</button>
        <input type="text" id="roomInput" placeholder="Room Code">
        <button onclick="joinRoom()">Join</button>
    </div>
    <canvas id="pong" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById('pong'), ctx = canvas.getContext('2d');
        let peer, conn, isHost = false, gameActive = false;
        let p1y = 160, p2y = 160, ball = {x:300, y:200, dx:5, dy:5};
        const ph = 80, pw = 10;

        function init() {
            peer = new Peer();
            peer.on('open', id => document.getElementById('status').innerText = "Your ID: " + id);
            peer.on('connection', c => { conn = c; isHost = true; setup(); });
        }

        function createRoom() { isHost = true; document.getElementById('status').innerText = "Waiting for player..."; }
        function joinRoom() { 
            const id = document.getElementById('roomInput').value;
            conn = peer.connect(id); isHost = false; setup(); 
        }

        function setup() {
            conn.on('open', () => { gameActive = true; requestAnimationFrame(gameLoop); });
            conn.on('data', data => {
                if(isHost) p2y = data.y;
                else { p1y = data.p1y; ball = data.ball; }
            });
        }

        window.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            const rawY = (e.clientY - rect.top) * (canvas.height / rect.height) - ph/2;
            // FIX: PADDLE CLAMPING
            const clampedY = Math.max(0, Math.min(rawY, canvas.height - ph));
            if(isHost) p1y = clampedY; else p2y = clampedY;
        };

        function gameLoop() {
            if(!gameActive) return;
            ctx.fillStyle = "black"; ctx.fillRect(0,0,600,400);
            ctx.fillStyle = "#00f2ff"; ctx.fillRect(10, p1y, pw, ph);
            ctx.fillStyle = "#ff006e"; ctx.fillRect(580, p2y, pw, ph);
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();

            if(isHost) {
                ball.x += ball.dx; ball.y += ball.dy;
                if(ball.y < 0 || ball.y > 400) ball.dy *= -1;
                if((ball.x < 20 && ball.y > p1y && ball.y < p1y+ph) || (ball.x > 580 && ball.y > p2y && ball.y < p2y+ph)) ball.dx *= -1.1;
                if(ball.x < 0 || ball.x > 600) { ball.x = 300; ball.dx = 5; }
                conn.send({ p1y, ball });
            } else {
                conn.send({ y: p2y });
            }
            requestAnimationFrame(gameLoop);
        }
        init();
    </script>
</body>
</html>
