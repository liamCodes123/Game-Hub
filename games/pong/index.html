<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiplayer Pong</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #lobby { background: #1e293b; padding: 30px; border: 2px solid #00f2ff; text-align: center; margin-top: 50px; border-radius: 10px; }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { background: #00f2ff; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        canvas { border: 2px dashed #00f2ff; background: #000; display: none; margin-top: 20px; }
        .back { margin-top: 20px; color: #64748b; text-decoration: none; }
    </style>
</head>
<body>
    <div id="lobby">
        <h2>PONG LOBBY</h2>
        <button onclick="createLobby()">Host New Game</button>
        <p>OR</p>
        <input type="text" id="joinCode" placeholder="Enter Code">
        <button onclick="joinLobby()">Join Game</button>
        <p id="status">Ready...</p>
    </div>

    <div id="gameArea" style="display:none; text-align:center;">
        <h2 id="score">0 - 0</h2>
        <canvas id="pong" width="600" height="400"></canvas>
        <p id="role"></p>
    </div>
    <a href="../../index.html" class="back">← Back to Hub</a>

    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');
        let peer = new Peer(); 
        let conn, isHost = false;

        const ball = { x: 300, y: 200, dx: 4, dy: 4 };
        const p1 = { y: 160, h: 80, score: 0 };
        const p2 = { y: 160, h: 80, score: 0 };

        function createLobby() {
            const id = "HUB-" + Math.random().toString(36).substring(2, 7).toUpperCase();
            peer = new Peer(id);
            peer.on('open', () => {
                document.getElementById('status').innerHTML = `Code: <b style="color:#00f2ff">${id}</b> (Share this)`;
                isHost = true;
            });
            peer.on('connection', c => { conn = c; initNetwork(); });
        }

        function joinLobby() {
            const code = document.getElementById('joinCode').value.toUpperCase();
            conn = peer.connect(code);
            conn.on('open', () => { initNetwork(); });
        }

        function initNetwork() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            canvas.style.display = 'block';
            document.getElementById('role').innerText = isHost ? "You: Left Paddle" : "You: Right Paddle";
            
            canvas.onmousemove = e => {
                const rect = canvas.getBoundingClientRect();
                if(isHost) p1.y = e.clientY - rect.top - 40;
                else p2.y = e.clientY - rect.top - 40;
            };

            conn.on('data', data => {
                if(isHost) p2.y = data.p2Y;
                else { p1.y = data.p1Y; ball.x = data.ballX; ball.y = data.ballY; p1.score = data.s1; p2.score = data.s2; }
            });
            gameLoop();
        }

        function gameLoop() {
            ctx.fillStyle = "black"; ctx.fillRect(0,0,600,400);
            ctx.fillStyle = "#00f2ff"; ctx.fillRect(10, p1.y, 10, p1.h);
            ctx.fillStyle = "#ff006e"; ctx.fillRect(580, p2.y, 10, p2.h);
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();

            if(isHost) {
                ball.x += ball.dx; ball.y += ball.dy;
                if(ball.y < 0 || ball.y > 400) ball.dy *= -1;
                if(ball.x < 20 && ball.y > p1.y && ball.y < p1.y+p1.h) ball.dx = 4;
                if(ball.x > 570 && ball.y > p2.y && ball.y < p2.y+p2.h) ball.dx = -4;
                if(ball.x < 0) { p2.score++; ball.x=300; }
                if(ball.x > 600) { p1.score++; ball.x=300; }
                conn.send({ p1Y: p1.y, ballX: ball.x, ballY: ball.y, s1: p1.score, s2: p2.score });
            } else {
                conn.send({ p2Y: p2.y });
            }
            document.getElementById('score').innerText = `${p1.score} - ${p2.score}`;
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
