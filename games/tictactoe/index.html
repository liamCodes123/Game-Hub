<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Fixed TicTacToe</title>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #1e293b; border: 2px solid #00f2ff; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; }
    </style>
</head>
<body>
    <div id="status">Turn: X</div>
    <div class="grid" id="grid"></div>
    <script>
        let board = Array(9).fill(""), turn = "X", active = true;
        const grid = document.getElementById('grid');

        function draw() {
            grid.innerHTML = "";
            board.forEach((v, i) => {
                const c = document.createElement('div');
                c.className = 'cell'; c.innerText = v;
                c.onclick = () => {
                    if(!active || board[i]) return;
                    board[i] = turn;
                    check();
                    turn = turn === "X" ? "O" : "X";
                    document.getElementById('status').innerText = "Turn: " + turn;
                    draw();
                };
                grid.appendChild(c);
            });
        }

        function check() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            wins.forEach(w => {
                if(board[w[0]] && board[w[0]]==board[w[1]] && board[w[0]]==board[w[2]]) {
                    active = false; alert(board[w[0]] + " Wins!"); location.reload();
                }
            });
            if(!board.includes("") && active) { alert("Draw!"); location.reload(); }
        }
        draw();
    </script>
</body>
</html>
