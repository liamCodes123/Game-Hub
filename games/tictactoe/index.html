<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe</title>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #1e293b; border: 2px solid #00f2ff; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; font-weight: bold; }
        .cell.taken { cursor: not-allowed; }
        .status { margin: 20px; font-size: 1.5rem; color: #00f2ff; }
        .controls { margin-bottom: 10px; }
        button { background: #00f2ff; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="status" id="status">Your Turn (X)</div>
    <div class="controls">
        <button onclick="resetGame()">Reset</button>
        <button id="modeBtn" onclick="toggleMode()">Mode: vs Bot</button>
    </div>
    <div class="grid" id="grid"></div>
    <a href="../../index.html" style="color: #64748b; margin-top: 20px; text-decoration: none;">← Back</a>

    <script>
       
let board = Array(9).fill("");
let isBot = true, active = true, turn = "X";

function move(i) {
    if(!active || board[i]) return;
    board[i] = turn;
    if(check()) return;
    turn = "O";
    draw();
    if(isBot) setTimeout(botMove, 300);
}

function botMove() {
    if (!active) return;
    let bestScore = -Infinity;
    let move;
    for (let i = 0; i < 9; i++) {
        if (board[i] === "") {
            board[i] = "O";
            let score = minimax(board, 0, false);
            board[i] = "";
            if (score > bestScore) {
                bestScore = score;
                move = i;
            }
        }
    }
    board[move] = "O";
    if(!check()) { turn = "X"; document.getElementById('status').innerText = "Turn: X"; }
    draw();
}

const scores = { X: -10, O: 10, tie: 0 };

function minimax(board, depth, isMaximizing) {
    let result = getWinner();
    if (result !== null) return scores[result];

    if (isMaximizing) {
        let bestScore = -Infinity;
        for (let i = 0; i < 9; i++) {
            if (board[i] === "") {
                board[i] = "O";
                let score = minimax(board, depth + 1, false);
                board[i] = "";
                bestScore = Math.max(score, bestScore);
            }
        }
        return bestScore;
    } else {
        let bestScore = Infinity;
        for (let i = 0; i < 9; i++) {
            if (board[i] === "") {
                board[i] = "X";
                let score = minimax(board, depth + 1, true);
                board[i] = "";
                bestScore = Math.min(score, bestScore);
            }
        }
        return bestScore;
    }
}

function getWinner() {
    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(let w of wins) {
        if(board[w[0]] && board[w[0]]==board[w[1]] && board[w[0]]==board[w[2]]) return board[w[0]];
    }
    return board.includes("") ? null : "tie";
}

function check() {
    let result = getWinner();
    if (result) {
        active = false;
        document.getElementById('status').innerText = result === "tie" ? "Draw!" : result + " Wins!";
        draw();
        return true;
    }
    return false;
}
    </script>
</body>
</html>
