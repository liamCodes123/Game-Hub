<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe</title>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #1e293b; border: 2px solid #00f2ff; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; font-weight: bold; }
        .cell.taken { cursor: not-allowed; }
        .status { margin: 20px; font-size: 1.5rem; color: #00f2ff; }
        .controls { margin-bottom: 10px; }
        button { background: #00f2ff; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="status" id="status">Your Turn (X)</div>
    <div class="controls">
        <button onclick="resetGame()">Reset</button>
        <button id="modeBtn" onclick="toggleMode()">Mode: vs Bot</button>
    </div>
    <div class="grid" id="grid"></div>
    <a href="../../index.html" style="color: #64748b; margin-top: 20px; text-decoration: none;">← Back</a>

    <script>
        let board = ["","","","","","","","",""];
        let isBotMode = true;
        let gameActive = true;
        const grid = document.getElementById('grid');

        function init() {
            grid.innerHTML = '';
            board.forEach((cell, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.innerText = cell;
                div.addEventListener('click', () => makeMove(i));
                grid.appendChild(div);
            });
        }

        function toggleMode() {
            isBotMode = !isBotMode;
            document.getElementById('modeBtn').innerText = isBotMode ? "Mode: vs Bot" : "Mode: Local P2";
            resetGame();
        }

        function makeMove(i) {
            if (board[i] || !gameActive) return;
            board[i] = "X";
            update();
            if (gameActive && isBotMode) setTimeout(botMove, 500);
        }

        function botMove() {
            let emptyIndices = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (emptyIndices.length > 0 && gameActive) {
                let random = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
                board[random] = "O";
                update();
            }
        }

        function update() {
            init();
            checkWinner();
        }

        function checkWinner() {
            const winPaths = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let path of winPaths) {
                const [a, b, c] = path;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    document.getElementById('status').innerText = board[a] + " Wins!";
                    gameActive = false;
                    return;
                }
            }
            if (!board.includes("")) {
                document.getElementById('status').innerText = "Draw!";
                gameActive = false;
            }
        }

        function resetGame() {
            board = ["","","","","","","","",""];
            gameActive = true;
            document.getElementById('status').innerText = "Your Turn (X)";
            init();
        }

        init();
    </script>
</body>
</html>
