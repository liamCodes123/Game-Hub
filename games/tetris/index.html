<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Fixed Tetris</title>
</head>
<body style="background:#0f172a; color:white; text-align:center;">
    <canvas id="t" width="240" height="400" style="border:2px solid #4ade80"></canvas>
    <script>
        const c = document.getElementById('t'), x = c.getContext('2d');
        let pos = {x: 4, y: 0};
        function draw() {
            x.fillStyle = "black"; x.fillRect(0,0,240,400);
            x.fillStyle = "#4ade80"; x.fillRect(pos.x*20, pos.y*20, 20, 20);
            pos.y++;
            if(pos.y > 19) pos.y = 0;
            setTimeout(draw, 200);
        }
        window.onkeydown = (e) => {
            if(e.keyCode==37) pos.x--; if(e.keyCode==39) pos.x++;
        };
        draw();
    </script>
</body>
</html>
