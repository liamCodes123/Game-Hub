<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Breakout</title>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        canvas { border: 2px solid #00f2ff; background: #1e293b; }
        .back-btn { color: #64748b; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>
    <h2 style="color:#00f2ff">BREAKOUT</h2>
    <canvas id="breakout" width="480" height="320"></canvas>
    <a href="../../index.html" class="back-btn">← Back to Hub</a>

    <script>
        const canvas = document.getElementById("breakout");
        const ctx = canvas.getContext("2d");
        let x = canvas.width/2, y = canvas.height-30, dx = 2, dy = -2;
        let paddleH = 10, paddleW = 75, paddleX = (canvas.width-paddleW)/2;
        let rightPressed = false, leftPressed = false;
        let bricks = [];

        for(let c=0; c<5; c++) {
            bricks[c] = [];
            for(let r=0; r<3; r++) { bricks[c][r] = { x: 0, y: 0, status: 1 }; }
        }

        document.addEventListener("keydown", e => { if(e.key == "Right" || e.key == "ArrowRight") rightPressed = true; else if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = true; });
        document.addEventListener("keyup", e => { if(e.key == "Right" || e.key == "ArrowRight") rightPressed = false; else if(e.key == "Left" || e.key == "ArrowLeft") leftPressed = false; });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw Bricks
            for(let c=0; c<5; c++) {
                for(let r=0; r<3; r++) {
                    if(bricks[c][r].status == 1) {
                        let bx = (c*(75+10))+30, by = (r*(20+10))+30;
                        bricks[c][r].x = bx; bricks[c][r].y = by;
                        ctx.fillStyle = "#ff006e";
                        ctx.fillRect(bx, by, 75, 20);
                    }
                }
            }
            // Ball & Paddle
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#00f2ff"; ctx.fillRect(paddleX, canvas.height-paddleH, paddleW, paddleH);

            // Collision
            for(let c=0; c<5; c++) {
                for(let r=0; r<3; r++) {
                    let b = bricks[c][r];
                    if(b.status == 1 && x > b.x && x < b.x+75 && y > b.y && y < b.y+20) { dy = -dy; b.status = 0; }
                }
            }

            if(x + dx > canvas.width-10 || x + dx < 10) dx = -dx;
            if(y + dy < 10) dy = -dy;
            else if(y + dy > canvas.height-10) {
                if(x > paddleX && x < paddleX + paddleW) dy = -dy;
                else { document.location.reload(); }
            }
            
            if(rightPressed && paddleX < canvas.width-paddleW) paddleX += 7;
            else if(leftPressed && paddleX > 0) paddleX -= 7;

            x += dx; y += dy;
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
