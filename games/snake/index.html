<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Retro</title>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        canvas { border: 4px solid #00f2ff; background: #1e293b; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .stats { margin: 20px; font-size: 1.5rem; color: #00f2ff; }
        .back-btn { color: white; text-decoration: none; margin-top: 20px; border: 1px solid #555; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="stats">Score: <span id="score">0</span></div>
    <canvas id="snakeGame" width="400" height="400"></canvas>
    <a href="../../index.html" class="back-btn">← Back to Hub</a>

    <script>
        const canvas = document.getElementById('snakeGame');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        let score = 0;
        let gridSize = 20;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0, dy = 0;

        function draw() {
            // Clear Canvas
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake (Drawn texture: Rounded Rects)
            ctx.fillStyle = '#00f2ff';
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // Draw Food
            ctx.fillStyle = '#ff006e';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + 10, food.y * gridSize + 10, 8, 0, Math.PI * 2);
            ctx.fill();

            moveSnake();
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                snake.pop();
            }

            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || checkCollision(head)) {
                resetGame();
            }
        }

        function checkCollision(head) {
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return true;
            }
            return false;
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * 20);
            food.y = Math.floor(Math.random() * 20);
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            dx = 0; dy = 0; score = 0;
            scoreElement.innerText = score;
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -1; }
            if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = 1; }
            if (e.key === 'ArrowLeft' && dx === 0) { dx = -1; dy = 0; }
            if (e.key === 'ArrowRight' && dx === 0) { dx = 1; dy = 0; }
        });

        setInterval(draw, 100);
    </script>
</body>
</html>
