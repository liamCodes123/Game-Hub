<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Evil Mines</title>
    <style>
        .g { display: grid; grid-template-columns: repeat(16, 25px); background: #00f2ff; gap: 1px; }
        .c { width: 25px; height: 25px; background: #1e293b; color: white; text-align: center; cursor: pointer; }
    </style>
</head>
<body>
    <div class="g" id="b"></div>
    <script>
        const b = document.getElementById('b'), board = [], size = 16;
        for(let i=0; i<size*size; i++) {
            const el = document.createElement('div'); el.className = 'c';
            const isMine = Math.random() < 0.22; // 22% mine density
            board.push({el, isMine});
            el.onclick = () => {
                if(isMine) { alert("BOOM"); location.reload(); }
                el.style.background = "#0f172a"; el.innerText = "0";
            };
            b.appendChild(el);
        }
    </script>
</body>
</html>
