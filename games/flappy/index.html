<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Fixed Flappy</title>
    <style>body { background: #0f172a; display: flex; justify-content: center; overflow: hidden; }</style>
</head>
<body>
    <canvas id="f" width="320" height="480" style="border:2px solid #00f2ff"></canvas>
    <script>
        const c = document.getElementById('f'), x = c.getContext('2d');
        let bird = {y:200, v:0, g:0.5}, pipes = [], score = 0, alive = true;

        function step() {
            if(!alive) return;
            x.fillStyle = "black"; x.fillRect(0,0,320,480);
            bird.v += bird.g; bird.y += bird.v;
            
            // FIX: FLOOR DETECTION
            if(bird.y > 460 || bird.y < 0) die();

            if(Math.random() < 0.02) pipes.push({x:320, t:Math.random()*200+50});

            x.fillStyle = "#ff006e"; x.fillRect(50, bird.y, 20, 20);
            x.fillStyle = "#00f2ff";
            pipes.forEach((p, i) => {
                p.x -= 2;
                x.fillRect(p.x, 0, 40, p.t);
                x.fillRect(p.x, p.t+120, 40, 480);
                if(p.x < 70 && p.x > 30 && (bird.y < p.t || bird.y > p.t+100)) die();
                if(p.x < -40) { pipes.splice(i,1); score++; }
            });
            requestAnimationFrame(step);
        }
        function die() { alive = false; alert("Score: "+score); location.reload(); }
        window.onclick = () => bird.v = -8;
        step();
    </script>
</body>
</html>
