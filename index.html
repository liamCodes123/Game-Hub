<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .hero { background-color: #0f172a; background-image: linear-gradient(rgba(0,242,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.05) 1px, transparent 1px); background-size: 30px 30px; border-bottom: 2px solid #00f2ff; }
        .card-img { background: repeating-linear-gradient(45deg, #1e293b, #1e293b 10px, #2d3748 10px, #2d3748 20px); height: 150px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">ARCADE<span>HUB</span></div>
        <input type="text" id="gameSearch" placeholder="Search games...">
    </nav>

    <header class="hero" style="padding: 60px 5%;">
        <h1>My Game Library</h1>
        <p style="color: #94a3b8;">Five retro games, one destination.</p>
    </header>

    <main class="container" style="padding: 40px 5%;">
        <div class="filter-bar" style="margin-bottom: 30px;">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="retro">Retro</button>
            <button class="filter-btn" data-filter="action">Action</button>
        </div>

        <section class="game-grid" id="gameGrid">
            <div class="game-card" data-category="retro">
                <div class="card-img">🏓</div>
                <div class="card-info"><h3>Pong Multiplayer</h3><a href="./games/pong/index.html" class="btn-play">Play</a></div>
            </div>
            <div class="game-card" data-category="action">
                <div class="card-img">👾</div>
                <div class="card-info"><h3>Space Invaders</h3><a href="./games/space-invaders/index.html" class="btn-play">Play</a></div>
            </div>
            <div class="game-card" data-category="retro">
                <div class="card-img">🐍</div>
                <div class="card-info"><h3>Snake Retro</h3><a href="./games/snake/index.html" class="btn-play">Play</a></div>
            </div>
            <div class="game-card" data-category="retro">
                <div class="card-img">⭕</div>
                <div class="card-info"><h3>Tic-Tac-Toe</h3><a href="./games/tictactoe/index.html" class="btn-play">Play</a></div>
            </div>
            <div class="game-card" data-category="action">
                <div class="card-img">🧱</div>
                <div class="card-info"><h3>Breakout</h3><a href="./games/breakout/index.html" class="btn-play">Play</a></div>
            </div>
        </section>
    </main>
    <script src="./script.js"></script>
</body>
</html>
