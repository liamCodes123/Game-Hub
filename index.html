<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">ARCADE<span>HUB</span></div>
        <input type="text" id="gameSearch" placeholder="Search games...">
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Web Arcade</h1>
            <p>Multiplayer Games & Retro Classics</p>
        </div>
    </header>

    <main class="container">
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All Games</button>
            <button class="filter-btn" data-filter="multi">Multiplayer</button>
            <button class="filter-btn" data-filter="solo">Single Player</button>
        </div>

        <section class="game-grid" id="gameGrid">
            <div class="game-card" data-category="multi">
                <div class="card-img">🏓</div>
                <div class="card-info">
                    <h3>Pong Multiplayer</h3>
                    <span class="tag">Online Lobby</span>
                    <a href="./games/pong/index.html" class="btn-play">Play Now</a>
                </div>
            </div>

            <div class="game-card" data-category="solo">
                <div class="card-img">👾</div>
                <div class="card-info">
                    <h3>Space Invaders</h3>
                    <span class="tag">Classic</span>
                    <a href="./games/space-invaders/index.html" class="btn-play">Play Now</a>
                </div>
            </div>

            <div class="game-card" data-category="multi">
                <div class="card-img">⭕</div>
                <div class="card-info">
                    <h3>Tic-Tac-Toe</h3>
                    <span class="tag">Bot / Friend</span>
                    <a href="./games/tictactoe/index.html" class="btn-play">Play Now</a>
                </div>
            </div>

            <div class="game-card" data-category="solo">
                <div class="card-img">🧱</div>
                <div class="card-info">
                    <h3>Breakout</h3>
                    <span class="tag">Action</span>
                    <a href="./games/breakout/index.html" class="btn-play">Play Now</a>
                </div>
            </div>

            <div class="game-card" data-category="solo">
                <div class="card-img">🐍</div>
                <div class="card-info">
                    <h3>Snake Retro</h3>
                    <span class="tag">Retro</span>
                    <a href="./games/snake/index.html" class="btn-play">Play Now</a>
                </div>
            </div>
        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>
