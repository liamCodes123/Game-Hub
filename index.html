<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arcade Hub + Global Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">NEON<span>ARCADE</span></div>
        <input type="text" id="gameSearch" placeholder="Search games...">
    </nav>

    <header class="hero">
        <h1>UNBEATABLE ARCADE</h1>
        <p>Global multiplayer, smarter bots, zero lag.</p>
    </header>

    <div class="main-layout">
        <main class="container">
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="multi">Multiplayer</button>
                <button class="filter-btn" data-filter="puzzle">Puzzle</button>
            </div>

            <div class="game-grid" id="gameGrid">
                <div class="game-card" data-category="puzzle">
                    <div class="card-img">⭕</div>
                    <div class="card-info">
                        <span class="tag">Unbeatable AI</span>
                        <h3>Tic-Tac-Toe</h3>
                        <a href="games/tictactoe/index.html" class="btn-play">Play Now</a>
                    </div>
                </div>

                <div class="game-card" data-category="multi">
                    <div class="card-img">🏓</div>
                    <div class="card-info">
                        <span class="tag">P2P Multi</span>
                        <h3>Neon Pong</h3>
                        <a href="games/pong/index.html" class="btn-play">Play Now</a>
                    </div>
                </div>

                <div class="game-card" data-category="puzzle">
                    <div class="card-img">💣</div>
                    <div class="card-info">
                        <span class="tag">Retro</span>
                        <h3>Minesweeper</h3>
                        <a href="games/minesweeper/index.html" class="btn-play">Play Now</a>
                    </div>
                </div>
                
                <div class="game-card" data-category="all">
                    <div class="card-img">🐦</div>
                    <div class="card-info">
                        <span class="tag">Highscore</span>
                        <h3>Neon Flappy</h3>
                        <a href="games/flappy/index.html" class="btn-play">Play Now</a>
                    </div>
                </div>
            </div>
        </main>

        <aside class="chat-container">
            <div class="chat-header">Global Lobby Chat</div>
            <div id="chat-messages">
                <div class="msg">Connecting to global lobby...</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Say hello...">
                <button id="sendChat">Send</button>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
