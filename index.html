<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Arcade | Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">NEON<span>ARCADE</span></div>
        <input type="text" id="gameSearch" placeholder="Search games...">
    </nav>

    <header class="hero">
        <h1>UNBEATABLE ARCADE</h1>
        <p>Elite AI and Lag-Free Multiplayer</p>
    </header>

    <main class="container">
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="multi">Multiplayer</button>
            <button class="filter-btn" data-filter="puzzle">Puzzle</button>
            <button class="filter-btn" data-filter="retro">Retro</button>
        </div>

        <div class="game-grid" id="gameGrid">
            <div class="game-card" data-category="puzzle">
                <div class="card-img">⭕</div>
                <div class="card-info">
                    <span class="tag">Impossible AI</span>
                    <h3>Tic-Tac-Toe</h3>
                    <a href="games/tictactoe/index.html" class="btn-play">Play Bot</a>
                </div>
            </div>

            <div class="game-card" data-category="multi">
                <div class="card-img">🏓</div>
                <div class="card-info">
                    <span class="tag">Host/Join</span>
                    <h3>Neon Pong</h3>
                    <a href="games/pong/index.html" class="btn-play">Play Online</a>
                </div>
            </div>
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
